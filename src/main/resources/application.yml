server:
  port: 8080

spring:
  application:
    name: codebase-qa
  
  datasource:
    url: jdbc:postgresql://localhost:5432/codebaseqa
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  data:
    redis:
      url: redis://127.0.0.1:6379
  
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:your-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-client-secret}
            scope: repo,read:user
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-minimum-32-characters-long-change-this-in-production}
    expiration-ms: 86400000  # 24 hours
  
  github:
    client-id: ${GITHUB_CLIENT_ID:your-client-id}
    client-secret: ${GITHUB_CLIENT_SECRET:your-client-secret}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/api/auth/github/callback}
  
  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key}
    embedding-model: text-embedding-004
    chat-model: gemini-1.5-flash
    base-url: https://generativelanguage.googleapis.com
  
  aws:
    region: ${AWS_REGION:eu-north-1}
    sqs:
      queue-url: ${SQS_QUEUE_URL:}
      dlq-url: ${SQS_DLQ_URL:}
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
  
  rate-limit:
    queries-per-hour: 20
    repos-per-hour: 5
  
  indexing:
    temp-dir: /tmp/codebase-qa
    max-file-size-kb: 500
    supported-extensions: .java,.ts,.tsx,.js,.jsx,.py,.go,.rs,.cpp,.c,.h,.rb,.php,.cs,.kt,.swift,.scala
    excluded-dirs: node_modules,.git,dist,build,target,.idea,.vscode,vendor,__pycache__
  
  cors:
    allowed-origins: http://localhost:5173

  frontend:
    url: http://localhost:5173

logging:
  level:
    com.codebaseqa: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
